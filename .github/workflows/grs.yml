name: Generate GitHub Readme Stats Cards

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # Suppresses the Node 20 deprecation warning

jobs:
  stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT }} # Uses your personal token to checkout

      - name: Create profile directory
        run: mkdir -p profile # Forces creation of the missing directory

      - name: Generate Main Stats Card
        uses: anuraghazra/github-readme-stats-action@v2
        with:
          card: stats
          options: username=cyb3rkun&show_icons=true&theme=tokyonight-storm&hide_border=true
          token: ${{ secrets.PAT }}

      - name: Generate Top Languages Card
        uses: anuraghazra/github-readme-stats-action@v2
        with:
          card: top-langs
          options: username=cyb3rkun&layout=compact&theme=tokyonight-storm&hide_border=true&langs_count=6
          token: ${{ secrets.PAT }}

      - name: Deploy Generated SVGs to Repository
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update local GitHub README stats SVGs"
          file_pattern: "profile/*.svg"
          branch: main # Explicitly targets your default branch
